params:
  - id: ANTHROPIC_API_KEY
    type: password
    name: "ANTHROPIC_API_KEY"
    description: "Anthropic API key, used by the bundled Claude Code CLI to render HTML. Get one at https://console.anthropic.com/settings/keys. Leave blank only if you set ANTHROPIC_BASE_URL to a relay that injects its own credential."
    optional: true
    default_value: ""

  - id: ANTHROPIC_BASE_URL
    type: string
    name: "ANTHROPIC_BASE_URL"
    description: "Optional. Route every Claude Code call through a custom Anthropic-compatible endpoint (relay / proxy). Leave blank to use the official api.anthropic.com endpoint."
    optional: true
    default_value: ""

  - id: ANTHROPIC_MODEL
    type: string
    name: "ANTHROPIC_MODEL"
    description: "Optional. Override the default Claude Code model (e.g. claude-opus-4-7, claude-sonnet-4-6, claude-haiku-4-5). Leave blank to use whatever Claude Code picks by default."
    optional: true
    default_value: ""
