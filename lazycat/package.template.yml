package: cloud.lazycat.app.html-anything
version: ${VERSION}
name: HTML Anything
description: AI 驱动的 HTML 编辑器 —— 把 Markdown / CSV / JSON 一键变成可发布的 HTML
author: nexu-io
license: Apache-2.0
homepage: https://github.com/microlazy-apps/lazy-html-anything

unsupported_platforms:
  - ios
  - android

locales:
  zh-CN:
    name: HTML Anything
    description: 自托管 HTML Anything —— 用 Claude Code 把任何内容渲染成可发布的 HTML
    usage: |
      ## 关于 HTML Anything

      HTML Anything 把 Markdown / CSV / TSV / JSON / SQL / 纯文本，
      通过一个本地编排的 Coding Agent，变成「可直接发布」的单页 HTML：
      朋友圈卡片、Keynote 风幻灯片、海报、简历、Twitter 配图、
      仪表盘原型……都能一键产出，再一键导出微信 / X / 知乎 / .html / .png。

      75 个 skill 模板覆盖 9 个产出场景（magazine 文章 · keynote · 简历 · 海报 ·
      小红书 · Twitter 卡 · 网页原型 · 数据报告 · Hyperframes 视频帧）。

      ## 与上游的差异

      上游 `nexu-io/html-anything` 默认调用你本机已经登录的 8 种 Coding Agent CLI
      （Claude Code / Cursor / Codex / Gemini …），但容器里无法读取你本机的登录态。
      本包装版**只内置 Claude Code**，并在容器里同时跑一个 **webshell**（路径
      `/shell`），让你按 Claude Code 自己的方式登录或配置。

      ## 首次配置

      1. 装好后浏览器打开 **`https://html-anything.{你的微服域名}/shell/`**
      2. 在 webshell 里跑 `claude /login`（如果你是 Claude Pro / Max 订阅）
         或参考 Claude Code 文档配置 API key（apiKeyHelper / 环境变量 / 其它）
      3. 凭证会写到 `~/.claude/.credentials.json` —— 这个目录在 lazycat 持久化卷
         上，升级 / 重启 / 重装 lpk 都保留

      ## 数据持久化

      所有状态写到 `/lzcapp/var/persist`（容器里的 `$HOME`）：
      - `.claude/` —— Claude Code 会话状态、settings、credentials
      - `.html-anything/skills/` —— 通过 Marketplace 安装的第三方 skill 包
      - `.html-anything/{vercel,cloudflare-pages}.json` —— 一键部署到 Vercel/CF 的凭证

      Wrapper 自己**不**管 API key、不写 `.env`、不动 settings.json ——
      所有 CLI 配置完全是 CLI 自己的事，我们只负责让它落到持久化盘上。

      ## 使用

      1. 访问 `https://html-anything.{你的微服域名}/`
      2. 顶栏「Agent」会自动检测到内置的 Claude Code
      3. 左侧粘贴 Markdown / CSV / JSON / SQL / 文本
      4. 中间从 75 个模板里挑一个（搜索 / 按场景过滤）
      5. ⌘+Enter，右侧 iframe 实时渲染（SSE 流式）
      6. 顶栏一键导出：微信 / X / 知乎 / .html / .png

      上游项目 https://github.com/nexu-io/html-anything（Apache-2.0）

  en:
    name: HTML Anything
    description: Self-hosted HTML Anything — render any content to publishable HTML via Claude Code
    usage: |
      ## About HTML Anything

      HTML Anything turns Markdown / CSV / TSV / JSON / SQL / plain text into
      ship-ready single-page HTML — magazine cards, Keynote-style decks,
      posters, résumés, Twitter cards, dashboards, data reports — all driven
      by a local coding-agent CLI, with one-click export to WeChat / X / Zhihu
      / `.html` / `.png`.

      75 skill templates across 9 surface modes (magazine · deck · résumé ·
      poster · Xiaohongshu · tweet card · web prototype · data report ·
      Hyperframes video frames).

      ## Difference from upstream

      Upstream `nexu-io/html-anything` is local-first — it shells out to
      whichever of 8 coding-agent CLIs you already have logged in on your
      laptop. In a container we can't access your local CLI sessions, so
      this wrapper **bundles Claude Code** plus a **webshell** at `/shell`
      so you can configure Claude Code through its own auth flow.

      ## First-time setup

      1. Open `https://html-anything.{your-box-domain}/shell/`
      2. Run `claude /login` (if you have a Claude Pro / Max subscription),
         or set up an API key per Claude Code's docs (`apiKeyHelper`, env,
         …) inside the webshell
      3. Credentials land in `~/.claude/.credentials.json` — that directory
         lives on the lazycat persistent volume, so it survives upgrades /
         restarts / reinstalls

      ## Persistent storage

      All state lives under `/lzcapp/var/persist` (which is `$HOME` inside
      the container):
      - `.claude/` — Claude Code session, settings, credentials
      - `.html-anything/skills/` — marketplace-installed skill packs
      - `.html-anything/{vercel,cloudflare-pages}.json` — Vercel/CF deploy creds

      The wrapper **does not** manage API keys, write any `.env`, or touch
      settings.json. Per-CLI configuration is the CLI's responsibility; the
      wrapper just makes whatever the CLI persists actually persistent.

      ## Usage

      1. Open `https://html-anything.{your-box-domain}/`
      2. Top bar auto-detects the bundled Claude Code
      3. Paste Markdown / CSV / JSON / SQL / text in the left pane
      4. Pick one of 75 skill templates in the middle
      5. ⌘+Enter — the right iframe streams HTML in real time (SSE)
      6. Top bar: one-click export to WeChat / X / Zhihu / `.html` / `.png`

      Upstream project: https://github.com/nexu-io/html-anything (Apache-2.0)
