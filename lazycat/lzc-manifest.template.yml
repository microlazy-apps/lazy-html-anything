application:
  subdomain: html-anything
  upstreams:
    # Order matters — lazycat picks the first matching prefix.
    - location: /shell
      backend: http://main:7681
    - location: /
      backend: http://main:3000
  public_path:
    - /
  health_check:
    test_url: http://main:3000/api/agents
    timeout: 10s
    start_period: 120s

services:
  main:
    image: ${LAZYCAT_IMAGE}
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # HOME → persisted bind. Every CLI's standard ~/.<cli>/ dir lives here
      # (Claude Code's ~/.claude, html-anything's ~/.html-anything, …).
      - HOME=/lzcapp/var/persist
    binds:
      - /lzcapp/var/persist:/lzcapp/var/persist
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/agents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
