application:
  subdomain: html-anything
  upstreams:
    - location: /
      backend: http://main:3000
  public_path:
    - /
  health_check:
    test_url: http://main:3000/api/agents
    timeout: 10s
    start_period: 120s

services:
  main:
    image: ${LAZYCAT_IMAGE}
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Persist Claude Code state + html-anything skills under
      # /lzcapp/var/persist via HOME.
      - HOME=/lzcapp/var/persist
      # Deploy-param wiring — the entrypoint surfaces a warning when blank.
      - ANTHROPIC_API_KEY={{.U.ANTHROPIC_API_KEY}}
      - ANTHROPIC_BASE_URL={{.U.ANTHROPIC_BASE_URL}}
      - ANTHROPIC_MODEL={{.U.ANTHROPIC_MODEL}}
    binds:
      - /lzcapp/var/persist:/lzcapp/var/persist
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/agents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
